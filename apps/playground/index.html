<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SysML Playground</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #cccccc;
      }
      #status {
        font-size: 12px;
        color: #858585;
      }
      #status.connected { color: #4ec9b0; }
      #status.error { color: #f14c4c; }
      #editor-container {
        flex: 1;
        overflow: hidden;
      }
      #log-panel {
        height: 150px;
        background: #1e1e1e;
        border-top: 1px solid #3c3c3c;
        overflow-y: auto;
        padding: 8px;
        font-family: 'Cascadia Code', 'Fira Code', monospace;
        font-size: 12px;
        flex-shrink: 0;
      }
      #log-panel .log-entry {
        padding: 1px 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #log-panel .log-info { color: #569cd6; }
      #log-panel .log-warn { color: #ce9178; }
      #log-panel .log-error { color: #f14c4c; }
      #log-panel .log-debug { color: #858585; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🔧 SysML Playground</h1>
        <span id="status">Initializing...</span>
      </header>
      <div id="editor-container"></div>
      <div id="log-panel"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
